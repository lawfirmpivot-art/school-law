<!DOCTYPE html>
<html class="light" lang="ko">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>전문가 에디터 - 학교폭력해설집</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&amp;family=Noto+Sans+KR:wght@300;400;500;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />

    <!-- Core Frameworks -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quill-image-resize-module@3.0.0/image-resize.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="storage.js"></script>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { primary: "#1a1a1a", "background-light": "#ffffff", "background-dark": "#0a0a0a" },
                    fontFamily: { display: ["Inter", "Noto Sans KR", "sans-serif"], body: ["Noto Sans KR", "sans-serif"] }
                }
            }
        };
    </script>

    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 transition-colors duration-300 antialiased; }
        }
        .glass-nav { @apply fixed top-0 w-full z-50 backdrop-blur-xl border-b bg-white/70 dark:bg-black/70 border-slate-200 dark:border-slate-800 transition-all duration-300; }
        
        /* Quill Customization */
        .ql-toolbar.ql-snow { @apply sticky top-[65px] z-40 border-x border-t-0 border-b border-slate-200 dark:border-slate-800 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md px-6 py-3 transition-colors; box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
        .ql-container.ql-snow { @apply border-none bg-white dark:bg-slate-900 transition-colors; }
        .ql-editor { @apply text-lg leading-relaxed min-h-[500px] px-12 py-12; font-family: 'Noto Sans KR', sans-serif; }
        .dark .ql-editor { color: #f1f5f9; }
        
        #title-editor .ql-editor { @apply text-4xl md:text-5xl font-black py-10 px-12 min-h-0 placeholder:text-slate-300; letter-spacing: -0.05em; }
        #summary-editor .ql-editor { @apply text-xl text-slate-500 italic px-12 py-6 min-h-0 border-l-4 border-slate-200 dark:border-slate-800; }
        
        .dark .ql-snow .ql-stroke { stroke: #94a3b8; }
        .dark .ql-snow .ql-fill { fill: #94a3b8; }
        .dark .ql-snow .ql-picker { color: #94a3b8; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { @apply bg-transparent; }
        ::-webkit-scrollbar-thumb { @apply bg-slate-200 dark:bg-slate-800 rounded-full; }
    </style>
</head>

<body>
    <nav class="glass-nav px-6 py-3 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <a class="flex items-center gap-1 group hover:opacity-70 transition-opacity" href="index.html">
                <span class="text-xl font-black tracking-tighter text-primary dark:text-white">학교폭력</span>
                <div class="bg-primary dark:bg-white text-white dark:text-primary px-1.5 py-0.5 ml-0.5">
                    <span class="text-base font-black tracking-tighter leading-none">해설집</span>
                </div>
                <span
                    class="text-[10px] font-bold bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded text-slate-500 ml-4">ADMIN</span>
            </a>
        </div>
        <div class="flex items-center gap-4">
            <button class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                onclick="document.documentElement.classList.toggle('dark')">
                <span class="material-symbols-outlined text-[20px]">dark_mode</span>
            </button>
            <button type="submit" form="post-form" id="publish-btn"
                class="bg-primary dark:bg-white text-white dark:text-primary px-8 py-2 rounded-full text-xs font-black uppercase tracking-widest hover:scale-105 transition-transform shadow-lg">
                원고 발행하기
            </button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto pt-28 pb-32 px-6">
        <form id="post-form" class="space-y-10">
            <input type="hidden" id="post-id">

            <!-- Metadata & Settings -->
            <section class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                <div class="lg:col-span-8 space-y-8">
                    <div
                        class="bg-white dark:bg-slate-900 p-8 rounded-sm border border-slate-200 dark:border-slate-800 shadow-sm space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 block">원고
                                    타입</label>
                                <select id="post-type"
                                    class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-sm text-sm p-3 focus:border-primary transition-colors">
                                    <option value="victim">피해학생 학교폭력 해설집</option>
                                    <option value="accused">가해학생 학교폭력 해설집</option>
                                    <option value="mutual">맞폭 학교폭력 해설집</option>
                                    <option value="appeal">불복절차 해설집</option>
                                    <option value="news">관련 뉴스 분석</option>
                                </select>
                            </div>
                            <div class="space-y-2">
                                <label
                                    class="text-[10px] font-bold uppercase tracking-widest text-slate-400 block">카테고리</label>
                                <input type="text" id="post-category" required
                                    class="w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-sm text-sm p-3 focus:border-primary mb-2"
                                    placeholder="주제 입력">
                                <select id="category-select"
                                    class="w-full bg-slate-50 dark:bg-slate-800 border-none text-[10px] font-bold py-1 text-slate-400">
                                    <option value="">이전 카테고리 선택</option>
                                </select>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 block">태그 (최대
                                10개)</label>
                            <div class="flex gap-2">
                                <input type="text" id="tag-input"
                                    class="flex-grow bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 rounded-sm text-sm p-3"
                                    placeholder="태그 입력 (쉼표로 구분 가능)">
                                <button type="button" id="add-tag-btn"
                                    class="bg-slate-200 dark:bg-slate-800 font-bold px-6 rounded-sm hover:bg-slate-300 transition-colors">추가</button>
                            </div>
                            <div id="tag-container" class="flex flex-wrap gap-2 mt-3"></div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-4">
                    <div
                        class="bg-white dark:bg-slate-900 p-8 rounded-sm border border-slate-200 dark:border-slate-800 shadow-sm h-full flex flex-col justify-between">
                        <div class="space-y-4">
                            <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 block">대표
                                썸네일</label>
                            <div id="image-upload-zone"
                                class="group relative aspect-square bg-slate-50 dark:bg-slate-800 rounded-sm border-2 border-dashed border-slate-200 dark:border-slate-700 overflow-hidden flex flex-col items-center justify-center cursor-pointer hover:border-primary transition-all">
                                <input type="file" id="post-image-file" accept="image/*" class="hidden">
                                <div id="upload-placeholder" class="text-center p-4">
                                    <span class="material-symbols-outlined text-3xl text-slate-300">add_a_photo</span>
                                    <p class="text-[9px] font-bold text-slate-400 mt-2 uppercase tracking-tight">드래그하거나
                                        클릭하여 업로드</p>
                                </div>
                                <div id="crop-container" class="absolute inset-0 hidden">
                                    <img id="thumbnail-preview" class="absolute cursor-move"
                                        style="touch-action: none;">
                                    <div class="absolute inset-0 pointer-events-none border-[20px] border-black/40">
                                    </div>
                                </div>
                            </div>
                            <div id="zoom-control" class="hidden space-y-2 mt-4">
                                <div class="flex justify-between items-center">
                                    <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">썸네일 줌
                                        조절</label>
                                    <button type="button" id="apply-crop-btn"
                                        class="text-[9px] font-bold text-primary dark:text-white underline uppercase">적용하기</button>
                                </div>
                                <input type="range" id="zoom-slider" min="1" max="3" step="0.01" value="1"
                                    class="w-full h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-primary">
                            </div>
                            <input type="text" id="post-image"
                                class="w-full bg-transparent border-none text-[10px] text-slate-300 italic p-0 truncate mt-4"
                                placeholder="또는 이미지 URL을 입력하세요">
                        </div>
                    </div>
                </div>
            </section>

            <!-- Editor Core -->
            <article
                class="bg-white dark:bg-slate-900 rounded-sm shadow-2xl border border-slate-200 dark:border-slate-800">
                <input type="text" id="post-title" required
                    class="w-full text-4xl font-black p-8 border-b dark:bg-slate-900 border-slate-100 dark:border-slate-800 focus:outline-none placeholder:text-slate-300"
                    placeholder="제목을 입력하세요...">
                <textarea id="post-summary" required
                    class="w-full text-lg p-8 border-b dark:bg-slate-900 border-slate-100 dark:border-slate-800 focus:outline-none resize-none placeholder:text-slate-300 text-slate-500"
                    placeholder="요약 문구를 작성하세요..." rows="2"></textarea>
                <div id="content-editor" class="min-h-[500px]"></div>
            </article>

            <div class="flex justify-between items-center py-10 opacity-50">
                <button type="button" onclick="history.back()"
                    class="text-[10px] font-black uppercase tracking-widest hover:underline">Cancel Changes</button>
                <span class="text-[10px] font-bold uppercase tracking-widest">Pivot Law Firm Editor System</span>
            </div>
        </form>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            let pid = urlParams.get('id');
            const typeParam = urlParams.get('type');
            let currentTags = [];

            // 로컬 서버에서 파라미터 유실되는 경우 대비 (수정: 새 글 작성 시 간섭하지 않도록 제거)
            if (!pid) {
                // pid = localStorage.getItem('last_post_id');
                // if (pid) console.log('PID recovered from localStorage:', pid);
            }

            // --- Quill Setup ---
            const toolbarOptions = [
                [{ 'header': [1, 2, 3, false] }],
                [{ 'size': ['small', false, 'large', 'huge'] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ 'color': [] }, { 'background': [] }],
                [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                [{ 'align': [] }],
                ['link', 'image'],
                ['clean']
            ];

            const contentEditor = new Quill('#content-editor', {
                theme: 'snow',
                placeholder: '상세 내용을 작성하세요. 사진을 드래그하거나 붙여넣으세요.',
                modules: {
                    toolbar: toolbarOptions,
                    imageResize: { displaySize: true }
                }
            });

            // --- Core Image Resizing Logic ---
            function resizeImage(base64Str, maxWidth = 450) {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = base64Str;
                    img.onload = () => {
                        if (img.width <= maxWidth) {
                            resolve(base64Str);
                            return;
                        }
                        const canvas = document.createElement('canvas');
                        const scaleFactor = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = img.height * scaleFactor;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                });
            }

            function fileToBase64(file) {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
            }

            // --- Custom Image Handling for Content Editor ---
            contentEditor.getModule('toolbar').addHandler('image', () => {
                const input = document.createElement('input');
                input.setAttribute('type', 'file');
                input.setAttribute('accept', 'image/*');
                input.click();
                input.onchange = async () => {
                    const file = input.files[0];
                    if (file) {
                        const base64 = await fileToBase64(file);
                        const resized = await resizeImage(base64, 450);
                        const range = contentEditor.getSelection();
                        contentEditor.insertEmbed(range.index, 'image', resized);
                    }
                };
            });

            // Intercept Pasted Images
            contentEditor.root.addEventListener('paste', async (e) => {
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                for (let item of items) {
                    if (item.type.indexOf('image') !== -1) {
                        e.preventDefault();
                        const file = item.getAsFile();
                        const base64 = await fileToBase64(file);
                        const resized = await resizeImage(base64, 450);
                        const range = contentEditor.getSelection();
                        contentEditor.insertEmbed(range.index, 'image', resized);
                    }
                }
            });

            // --- Thumbnail Handling ---
            const fileInput = document.getElementById('post-image-file');
            const imageZone = document.getElementById('image-upload-zone');
            const preview = document.getElementById('thumbnail-preview');
            const uploadPlaceholder = document.getElementById('upload-placeholder');
            const cropContainer = document.getElementById('crop-container');
            const zoomControl = document.getElementById('zoom-control');
            const zoomSlider = document.getElementById('zoom-slider');
            const applyCropBtn = document.getElementById('apply-crop-btn');

            let imgState = { x: 0, y: 0, scale: 1, isDragging: false, startX: 0, startY: 0 };

            function handleFile(file) {
                if (!file || !file.type.startsWith('image/')) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.onload = () => {
                        uploadPlaceholder.classList.add('hidden');
                        cropContainer.classList.remove('hidden');
                        zoomControl.classList.remove('hidden');
                        resetImage();
                    };
                };
                reader.readAsDataURL(file);
            }

            function resetImage() {
                const zoneSize = imageZone.offsetWidth;
                const ratio = preview.naturalWidth / preview.naturalHeight;

                if (ratio > 1) { // Landscape
                    preview.style.height = '100%';
                    preview.style.width = 'auto';
                } else { // Portrait
                    preview.style.width = '100%';
                    preview.style.height = 'auto';
                }

                imgState = { x: 0, y: 0, scale: 1, isDragging: false, startX: 0, startY: 0 };
                zoomSlider.value = 1;
                updatePreviewStyles();
            }

            function updatePreviewStyles() {
                preview.style.transform = `translate(${imgState.x}px, ${imgState.y}px) scale(${imgState.scale})`;
            }

            imageZone.addEventListener('dragover', (e) => { e.preventDefault(); imageZone.classList.add('border-primary'); });
            imageZone.addEventListener('dragleave', () => imageZone.classList.remove('border-primary'));
            imageZone.addEventListener('drop', (e) => { e.preventDefault(); imageZone.classList.remove('border-primary'); handleFile(e.dataTransfer.files[0]); });
            imageZone.addEventListener('click', (e) => { if (!imgState.isDragging && (e.target === imageZone || e.target === uploadPlaceholder || e.target.parentNode === uploadPlaceholder)) fileInput.click(); });
            fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
            zoomSlider.addEventListener('input', (e) => { imgState.scale = parseFloat(e.target.value); updatePreviewStyles(); });

            preview.addEventListener('mousedown', (e) => { e.preventDefault(); imgState.isDragging = true; imgState.startX = e.clientX - imgState.x; imgState.startY = e.clientY - imgState.y; preview.classList.add('cursor-grabbing'); });
            window.addEventListener('mousemove', (e) => { if (imgState.isDragging) { imgState.x = e.clientX - imgState.startX; imgState.y = e.clientY - imgState.startY; updatePreviewStyles(); } });
            window.addEventListener('mouseup', () => { imgState.isDragging = false; preview.classList.remove('cursor-grabbing'); });

            applyCropBtn.addEventListener('click', async () => {
                const canvas = document.createElement('canvas');
                canvas.width = 600; canvas.height = 600;
                const ctx = canvas.getContext('2d');
                const zoneSize = imageZone.offsetWidth;
                const scale = 600 / zoneSize;
                const rect = preview.getBoundingClientRect();
                const zoneRect = imageZone.getBoundingClientRect();
                const drawX = (rect.left - zoneRect.left) * scale;
                const drawY = (rect.top - zoneRect.top) * scale;
                const drawW = rect.width * scale;
                const drawH = rect.height * scale;
                ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, 600, 600);
                ctx.drawImage(preview, drawX, drawY, drawW, drawH);
                document.getElementById('post-image').value = canvas.toDataURL('image/jpeg', 0.8);
                alert('썸네일 크기 조정이 적용되었습니다.');
            });

            // --- Tag Handling ---
            const tagInput = document.getElementById('tag-input');
            const addTagBtn = document.getElementById('add-tag-btn');
            const tagContainer = document.getElementById('tag-container');

            function renderTags() {
                tagContainer.innerHTML = currentTags.map(tag => `
                    <span class="flex items-center gap-2 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 px-3 py-1 text-[10px] font-bold rounded-sm border border-slate-200 dark:border-slate-700">
                        # ${tag}
                        <button type="button" class="remove-tag-btn text-rose-500 hover:text-rose-400 font-black" data-tag="${tag}">×</button>
                    </span>
                `).join('');
                document.querySelectorAll('.remove-tag-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        currentTags = currentTags.filter(t => t !== btn.getAttribute('data-tag'));
                        renderTags();
                    });
                });
            }

            function addTag() {
                const raw = tagInput.value;
                // 콤마(,)로 분리하여 여러 태그 한꺼번에 등록
                const parts = raw.split(',').map(s => s.trim().replace(/^#/, '')).filter(Boolean);
                parts.forEach(val => {
                    if (val && !currentTags.includes(val) && currentTags.length < 10) {
                        currentTags.push(val);
                    }
                });
                if (parts.length > 0) {
                    renderTags();
                    tagInput.value = '';
                }
            }

            tagInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); addTag(); } });
            addTagBtn.addEventListener('click', addTag);

            // --- Init Editor ---
            async function init() {
                if (!window.CMS) {
                    setTimeout(init, 100);
                    return;
                }

                try {
                    const cats = await CMS.getCategories();
                    const select = document.getElementById('category-select');
                    select.innerHTML = '<option value="">이전 카테고리 선택</option>';
                    cats.forEach(c => {
                        const opt = document.createElement('option');
                        opt.value = opt.innerText = c;
                        select.appendChild(opt);
                    });

                    select.addEventListener('change', (e) => {
                        if (e.target.value) document.getElementById('post-category').value = e.target.value;
                    });

                    if (typeParam) document.getElementById('post-type').value = typeParam;

                    if (pid && pid !== 'null' && pid !== 'undefined') {
                        console.log('Edit mode: Loading data for ID', pid);
                        document.getElementById('post-id').value = pid;

                        const pubBtn = document.getElementById('publish-btn');
                        if (pubBtn) pubBtn.innerText = '원고 수정 완료';

                        const post = await CMS.getPost(pid);
                        if (post) {
                            console.log('Post data loaded:', post.title);
                            document.getElementById('post-type').value = post.type || 'victim';
                            document.getElementById('post-category').value = post.category || '';
                            document.getElementById('post-title').value = post.title || '';
                            document.getElementById('post-summary').value = post.summary || '';

                            if (post.content && contentEditor) {
                                contentEditor.clipboard.dangerouslyPasteHTML(post.content);
                            }

                            if (post.image) {
                                preview.src = post.image;
                                cropContainer.classList.remove('hidden');
                                uploadPlaceholder.classList.add('hidden');
                                zoomControl.classList.remove('hidden');
                                document.getElementById('post-image').value = post.image;

                                setTimeout(() => {
                                    resetImage();
                                }, 400);
                            }

                            currentTags = post.tags || [];
                            renderTags();
                        } else {
                            console.warn('No post found with ID:', pid);
                        }
                    }
                } catch (error) {
                    console.error('Init error:', error);
                }
            }
            init();

            // --- Save Post ---
            const postForm = document.getElementById('post-form');
            const publishBtn = document.getElementById('publish-btn');

            postForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const originalText = publishBtn.innerText;
                try {
                    publishBtn.innerText = '발행 중...';
                    publishBtn.disabled = true;

                    const post = {
                        id: document.getElementById('post-id').value || null,
                        type: document.getElementById('post-type').value,
                        category: document.getElementById('post-category').value,
                        tags: currentTags,
                        title: document.getElementById('post-title').value,
                        summary: document.getElementById('post-summary').value,
                        content: contentEditor.root.innerHTML,
                        image: document.getElementById('post-image').value,
                        author: '김경수 변호사',
                        date: new Date().toLocaleDateString('ko-KR').replace(/ /g, '').slice(0, -1)
                    };

                    const savedPost = await CMS.savePost(post);
                    if (savedPost && savedPost.id) {
                        alert('원고가 성공적으로 발행되었습니다.');
                        window.location.href = `view.html?id=${savedPost.id}`;
                    }
                } catch (err) {
                    console.error('Save error:', err);
                    alert('오류 발생: ' + err.message);
                } finally {
                    publishBtn.innerText = originalText;
                    publishBtn.disabled = false;
                }
            });
        });
    </script>
</body>

</html>
