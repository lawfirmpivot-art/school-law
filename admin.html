<!DOCTYPE html>
<html class="light" lang="ko">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>관리자 인증 - 학교폭력해설집</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&amp;family=Noto+Sans+KR:wght@300;400;500;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="storage.js"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#1a1a1a",
                        "background-light": "#ffffff",
                        "background-dark": "#0a0a0a",
                    }
                }
            }
        };
    </script>
</head>

<body
    class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300 min-h-screen flex items-center justify-center">

    <div
        class="max-w-md w-full p-8 bg-white dark:bg-slate-900 shadow-2xl rounded-sm border border-slate-200 dark:border-slate-800">
        <div id="login-section">
            <div class="text-center mb-10">
                <div
                    class="inline-flex items-center justify-center w-16 h-16 bg-slate-900 dark:bg-white text-white dark:text-slate-900 rounded-full mb-6">
                    <span class="material-symbols-outlined text-3xl">account_circle</span>
                </div>
                <h1 class="text-3xl font-black tracking-tighter">관리자 인증</h1>
                <p class="text-slate-500 text-sm mt-2">구글 로그인을 통해 관리자 권한을 인증하세요.</p>
                <p class="text-[10px] text-slate-400 mt-1 uppercase font-bold tracking-widest">(lawfirmpivot@gmail.com 전용)</p>
            </div>

            <div class="space-y-4">
                <button type="button" id="login-btn"
                    class="w-full flex items-center justify-center gap-3 bg-white border border-slate-200 text-slate-700 py-4 font-black rounded-xl hover:bg-slate-50 transition-all shadow-md dark:bg-zinc-800 dark:border-zinc-700 dark:text-white">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/>
                    </svg>
                    Google 계정으로 계속하기
                </button>

            </div>

            <div id="error-msg"
                class="hidden mt-4 p-4 bg-rose-50 dark:bg-rose-900/20 text-rose-500 text-sm text-center font-bold border border-rose-200 dark:border-rose-900/50 rounded-xl">
                인증에 실패했습니다. 정보를 확인해주세요.
            </div>

            <div class="mt-10 text-center pt-6 border-t border-slate-100 dark:border-zinc-800">
                <a href="index.html"
                    class="inline-flex items-center gap-2 text-sm text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors font-bold">
                    <span class="material-symbols-outlined text-lg">home</span> 메인으로 돌아가기
                </a>
            </div>
        </div>

        <div id="logout-section" class="hidden text-center">
            <div
                class="inline-flex items-center justify-center w-20 h-20 bg-green-500 text-white rounded-full mb-6 shadow-xl">
                <span class="material-symbols-outlined text-4xl">verified</span>
            </div>
            <h1 class="text-3xl font-black tracking-tighter mb-2">인증 완료</h1>
            <p id="admin-email" class="text-blue-600 dark:text-blue-400 text-sm font-black mb-2 uppercase tracking-tight"></p>
            <p class="text-slate-500 text-sm mb-10 font-medium">관리자 권한으로 로그인되었습니다.<br>이제 메뉴를 통해 글을 작성/수정할 수 있습니다.</p>

            <button id="logout-btn"
                class="w-full bg-slate-100 dark:bg-zinc-800 text-slate-600 dark:text-zinc-400 py-4 font-black rounded-xl hover:bg-slate-200 dark:hover:bg-zinc-700 transition-all uppercase tracking-widest text-sm mb-6">
                로그아웃 (권한 해제)
            </button>

            <a href="index.html"
                class="inline-flex items-center gap-2 text-sm text-slate-900 dark:text-white font-black hover:underline">
                메인 페이지로 이동하여 관리 시작
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const loginSection = document.getElementById('login-section');
            const logoutSection = document.getElementById('logout-section');
            const loginBtn = document.getElementById('login-btn');
            const logoutBtn = document.getElementById('logout-btn');
            const errorMsg = document.getElementById('error-msg');
            const adminEmailDisplay = document.getElementById('admin-email');

            async function updateUI() {
                const isAdmin = await CMS.isAdmin();
                const session = await CMS.getSession();
                
                if (isAdmin) {
                    loginSection.classList.add('hidden');
                    logoutSection.classList.remove('hidden');
                    
                    // 세션에서 이메일 가져오기
                    if (session) adminEmailDisplay.textContent = session.user.email;
                } else {
                    loginSection.classList.remove('hidden');
                    logoutSection.classList.add('hidden');
                    
                    // 로그인은 되어있는데 관리자가 아닌 경우 에러 표시
                    if (session && session.user.email !== 'lawfirmpivot@gmail.com') {
                        errorMsg.classList.remove('hidden');
                    }
                }
            }


            // 1. 구글 로그인 버튼 리스너 먼저 등록 (반응성 확보)
            if (loginBtn) {
                loginBtn.addEventListener('click', async () => {
                    console.log('Google login clicked');
                    const originalText = loginBtn.innerHTML;
                    loginBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> 로그인 중...';
                    loginBtn.disabled = true;
                    
                    try {
                        await CMS.login();
                    } catch (err) {
                        console.error('로그인 에러:', err);
                        alert('로그인 처리 중 오류가 발생했습니다. 브라우저 콘솔을 확인해주세요.');
                    } finally {
                        loginBtn.innerHTML = originalText;
                        loginBtn.disabled = false;
                    }
                });
            }

            // 2. 로그아웃 버튼 리스너 등록
            if (logoutBtn) {
                logoutBtn.addEventListener('click', async () => {
                    await CMS.logout();
                });
            }

            // 3. 마지막으로 UI 상태 업데이트
            await updateUI();
        });
    </script>
</body>

</html>
